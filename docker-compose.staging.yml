services:

  db-staging:
    image: postgres:15-alpine
    container_name: modeltech_staging_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    restart: unless-stopped

  backend-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modeltech_staging_backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: "8080"
      DB_URL: jdbc:postgresql://db-staging:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # ← réseau interne Docker : le backend contacte MinIO par son nom de service
      MINIO_ENDPOINT: http://minio-staging:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_BUCKET: ${MINIO_BUCKET:-media}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_HOST: ${MAIL_HOST}
      MASTERCLASS_MEET_LINK: ${MASTERCLASS_MEET_LINK}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
    depends_on:
      - db-staging
      - minio-staging
    networks:
      - dokploy-network
    restart: unless-stopped

  adminer-staging:
    image: adminer
    container_name: modeltech_staging_adminer
    networks:
      - dokploy-network
    restart: unless-stopped

  minio-staging:
    image: minio/minio
    container_name: modeltech_minio_staging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Indique à MinIO son URL publique (important pour les redirections S3)
#      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_CONSOLE_DOMAIN}
#      MINIO_SERVER_URL: https://${MINIO_PUBLIC_DOMAIN}
    volumes:
      - minio_data:/data
    networks:
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

      # ── API S3 (port 9000) — accès aux fichiers ──────────────────────────────
      - "traefik.http.routers.minio-api-staging.rule=Host(`${MINIO_PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.minio-api-staging.entrypoints=websecure"
      - "traefik.http.routers.minio-api-staging.tls=true"
      - "traefik.http.routers.minio-api-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-api-staging.service=minio-api-staging-svc"
      - "traefik.http.services.minio-api-staging-svc.loadbalancer.server.port=9000"
      # Header passthrough nécessaire pour l'API S3
      - "traefik.http.routers.minio-api-staging.middlewares=minio-headers-staging"
      - "traefik.http.middlewares.minio-headers-staging.headers.customrequestheaders.X-Forwarded-Proto=https"

      # ── Console (port 9001) ───────────────────────────────────────────────────
      - "traefik.http.routers.minio-console-staging.rule=Host(`${MINIO_CONSOLE_DOMAIN}`)"
      - "traefik.http.routers.minio-console-staging.entrypoints=websecure"
      - "traefik.http.routers.minio-console-staging.tls=true"
      - "traefik.http.routers.minio-console-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console-staging.service=minio-console-staging-svc"
      - "traefik.http.services.minio-console-staging-svc.loadbalancer.server.port=9001"

  dozzle-staging:
    image: amir20/dozzle:latest
    container_name: modeltech_staging_dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  dokploy-network:
    external: true