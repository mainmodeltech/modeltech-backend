version: '3.8'

services:

  db-staging:
    image: postgres:15-alpine
    container_name: modeltech_staging_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    restart: unless-stopped

  backend-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modeltech_staging_backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: "8080"
      DB_URL: jdbc:postgresql://db-staging:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_HOST: ${MAIL_HOST}
      MASTERCLASS_MEET_LINK: ${MASTERCLASS_MEET_LINK}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
    depends_on:
      - db-staging
      - minio-staging
    networks:
      - dokploy-network
    restart: unless-stopped

  adminer-staging:
    image: adminer
    container_name: modeltech_staging_adminer
    networks:
      - dokploy-network
    restart: unless-stopped

  minio-staging:
    image: minio/minio
    container_name: modeltech_staging_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - dokploy-network
    restart: unless-stopped


  dozzle-staging:
    image: amir20/dozzle:latest
    container_name: modeltech_staging_dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  dokploy-network:
    external: true
